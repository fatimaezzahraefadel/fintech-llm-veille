name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fintech
          POSTGRES_PASSWORD: fintech_secret
          POSTGRES_DB: fintech_veille_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Secrets GitHub (à configurer dans Settings → Secrets → Actions)
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'test-placeholder-gemini' }}
      NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY || 'test-placeholder-news' }}
      ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY || 'test-placeholder-av' }}
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: fintech_veille_test
      POSTGRES_USER: fintech
      POSTGRES_PASSWORD: fintech_secret
      CHROMA_PERSIST_DIR: /tmp/chromadb_test
      ENVIRONMENT: test
      WATCHED_TICKERS: AAPL,MSFT

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip dependencies
        run: |
          pip install --upgrade pip
          pip install \
            yfinance \
            newsapi-python \
            requests \
            httpx \
            beautifulsoup4 \
            pdfplumber \
            sqlalchemy \
            psycopg2-binary \
            alembic \
            langchain \
            langchain-text-splitters \
            langchain-google-genai \
            langchain-community \
            google-generativeai \
            pydantic \
            pydantic-settings \
            fastapi \
            "uvicorn[standard]" \
            loguru \
            python-dotenv \
            tenacity \
            pandas \
            pytest \
            pytest-asyncio \
            pytest-cov \
            ruff

      - name: Run linter (ruff)
        run: ruff check src/ tests/
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
